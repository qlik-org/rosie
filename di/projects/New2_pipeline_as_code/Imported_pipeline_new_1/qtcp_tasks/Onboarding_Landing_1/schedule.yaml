scheduling:
  - enabled: true
    schedulingType: TIME_BASED
    timeBasedScheduling:
      schedule:
        - RRULE:FREQ=WEEKLY;INTERVAL=1;BYDAY=SU;BYHOUR=19;BYMINUTE=0;BYSECOND=0
      startDateTime: 2026-05-24T19:00:00.0000000Z
      endDateTime: 0001-01-01T00:00:00.0000000Z
      timezone: Etc/UTC
    runOnReconnect: DEFAULT
