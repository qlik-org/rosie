properties:
  name: Registered_data_watermark
  id: registered_data_watermark-exwm
  type: REGISTERED_DATA
settings:
  artifactsLocation:
    internalSchema: '{{task.registered_data_watermark-exwm.internalSchema}}'
    taskSchema: '{{task.registered_data_watermark-exwm.taskSchema}}'
    databaseName: '{{task.registered_data_watermark-exwm.databaseName}}'
  incrementalSettings:
    registeredType: REPLICATE
    watermarkColumnName:
      expressionStatement: header__change_seq
    fromDateColumnName:
      expressionStatement: header__timestamp
    ctTableName:
      expressionStatement: ${SOURCE_TABLE_NAME}__ct
    softDeleteSupport: true
    softDeleteExpression:
      expressionStatement: ${header__change_oper} = 'D'
    priorImageSupport: true
    priorImageExpression:
      expressionStatement: ${header__change_oper} = 'B'
