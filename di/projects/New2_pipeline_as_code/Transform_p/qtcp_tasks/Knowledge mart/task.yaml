properties:
  name: Knowledge mart
  id: knowledge_mart-rpr6
  type: KNOWLEDGE_MART
settings:
  artifactsLocation:
    internalSchema: '{{task.knowledge_mart-rpr6.internalSchema}}'
    taskSchema: '{{task.knowledge_mart-rpr6.taskSchema}}'
    databaseName: '{{task.knowledge_mart-rpr6.databaseName}}'
  taskRuntime:
    maxNumberOfRecords: '{{task.knowledge_mart-rpr6.maxNumberOfRecords}}'
    warehouseSelection:
      warehouseName: '{{task.knowledge_mart-rpr6.warehouseName}}'
  indexArtifactsLocation:
    databricksVectorSearchEndpoint: '{{task.knowledge_mart-rpr6.databricksVectorSearchEndpoint}}'
    schema: '{{task.knowledge_mart-rpr6.indexSchema}}'
    name: '{{task.knowledge_mart-rpr6.indexName}}'
    database: '{{task.knowledge_mart-rpr6.indexDatabase}}'
  llmSettings:
    kindId: llm:snowflake
    parameters:
      embedding_model: nv-embed-qa-4
      completion_model: mistral-7b
