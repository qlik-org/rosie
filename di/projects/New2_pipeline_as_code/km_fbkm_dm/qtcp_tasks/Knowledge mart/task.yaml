properties:
  name: Knowledge mart
  id: knowledge_mart-94ii
  type: KNOWLEDGE_MART
settings:
  artifactsLocation:
    internalSchema: '{{task.knowledge_mart-94ii.internalSchema}}'
    taskSchema: '{{task.knowledge_mart-94ii.taskSchema}}'
    databaseName: '{{task.knowledge_mart-94ii.databaseName}}'
  artifactsSettings:
    artifactsPrefix: b_
  taskRuntime:
    bulkSize: 98
    maxNumberOfRecords: '{{task.knowledge_mart-94ii.maxNumberOfRecords}}'
    tableUpdateConcurrency: 12
    warehouseSelection:
      warehouseName: '{{task.knowledge_mart-94ii.warehouseName}}'
  indexActionOnPrepare: CREATE_IF_NOT_EXISTS
  viewType: SECURE_VIEW
  testAssistantSettings:
    numberOfDocumentsRetrieved: 10
    userPromptTemplate: "New Prompt: Use the given context to answer the question. If you don't know the answer, say you don't know. Use three sentences maximum and keep the answer concise. \nContext: {context}.\n\nQuestion: {question}\nHelpful Answer:"
    filterConditions: filter_text
    answerGeneration: ANSWER_GENERATION_DISABLED
  indexArtifactsLocation:
    databricksVectorSearchEndpoint: '{{task.knowledge_mart-94ii.databricksVectorSearchEndpoint}}'
    schema: knowledgemart
    name: '{{task.knowledge_mart-94ii.indexName}}'
    database: ROSIE
  vectorDbTargetType: EXTERNAL_VECTOR_DB
  vectorDbConnection: '{{task.knowledge_mart-94ii.vectorDbConnection}}'
  llmConnection: '{{task.knowledge_mart-94ii.llmConnection}}'
  llmSettings:
    kindId: 'llm:OpenAI@1.0.0'
    parameters:
      embedding_model: text-embedding-3-large
      completion_model: gpt-4o
