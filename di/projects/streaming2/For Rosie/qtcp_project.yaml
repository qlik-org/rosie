properties:
  exportVersion: '1.0'
  name: '{{projectName}}'
  space: 'ref{project.current.spaceId}'
  type: DATA_PIPELINE
  platformType: QLIK_OPEN_LAKEHOUSE
  platformConnection: '{{platformConnection}}'
  cloudStagingConnection: '{{cloudStagingConnection}}'
settings:
  artifactsNaming:
    suffixChangesView: __changes2
    suffixCurrentView: '3'
    suffixHistoryViews: __history4
    suffixInternalSchema: __internal1
    prefixSchema: '{{project.current.prefixSchema}}'
    defaultSchemaNameOption: NO_FURTHER_PROCESSING
