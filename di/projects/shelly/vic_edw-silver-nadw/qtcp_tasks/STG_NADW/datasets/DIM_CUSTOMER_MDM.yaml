properties:
  id: dim_customer_mdm-jnuw
  name: DIM_CUSTOMER_MDM
  inputDatasets:
    - datasetId: dim_customer--ulc
      name: dim_Customer
      projectId: '{{project.shelly$_$vic_edw-bronze-common.projectId}}'
      taskId: raw_nadw-wn_4
  tableDef:
    name: DIM_CUSTOMER_MDM
    columns:
      - name: CONSOLIDATED_AR_CUSTOMER_NAME
        ordinal: 1
        nullable: true
        datatype:
          type: STRING
          length: 30
          originalType: VARCHAR
          originalTypeFull: VARCHAR(30)
        id: consolidated_ar_customer_name
      - name: CUSTOMER_CODE
        ordinal: 2
        primaryKeyOrdinal: 1
        datatype:
          type: STRING
          length: 25
          originalType: VARCHAR
          originalTypeFull: VARCHAR(25)
        id: customer_code
      - name: CUSTOMER_GLOBAL_NAME
        ordinal: 3
        nullable: true
        datatype:
          type: STRING
          length: 30
          originalType: VARCHAR
          originalTypeFull: VARCHAR(30)
        id: customer_global_name
      - name: CUSTOMER_SAME_DAY_SHIP_AGREEMENT_FLAG
        ordinal: 4
        nullable: true
        datatype:
          type: STRING
          length: 1
          originalType: VARCHAR
          originalTypeFull: VARCHAR(1)
        id: customer_same_day_ship_agreement_flag
  customDatasetSettings:
    customSql:
      expressionStatement: >-
        Select 
          "Consolidated_AR_Customer_Name" as CONSOLIDATED_AR_CUSTOMER_NAME,
          "Customer" as CUSTOMER_CODE,
          "Customer_Global_Name" as CUSTOMER_GLOBAL_NAME,
          "Customer_Same_Day_Ship_Agreement_Flag" as CUSTOMER_SAME_DAY_SHIP_AGREEMENT_FLAG
        From ${dim_Customer}
      alias:
        - name: dim_Customer
          value: '{{project.shelly$_$vic_edw-bronze-common.projectId}}$_$raw_nadw-wn_4$_$dim_customer--ulc'
    incremental: false
