properties:
  name: Transform
  id: transform-xvqa
  type: TRANSFORM
settings:
  artifactsSettings:
    materialized: false
  artifactsLocation:
    internalSchema: '{{task.transform-xvqa.internalSchema}}'
    taskSchema: '{{task.transform-xvqa.taskSchema}}'
    databaseName: '{{task.transform-xvqa.databaseName}}'
  taskRuntime:
    warehouseSelection:
      warehouseName: '{{task.transform-xvqa.warehouseName}}'
  catalogIntegration:
    publishDatasets: false
  tableTypeSettings:
    tableType: REGULAR
    icebergSettings:
      snowflakeExternalVolume: ''
      folderLocationType: DATA_ASSET_NAME
      enableOpenCatalogSync: false
      snowflakeOpenCatalog: ''
  viewType: DEFAULT
