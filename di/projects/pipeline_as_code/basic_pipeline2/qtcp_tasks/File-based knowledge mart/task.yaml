properties:
  name: File-based knowledge mart
  id: file_based_knowledge_mart-xvq3
  type: FILE_BASED_KNOWLEDGE_MART
settings:
  taskRuntime:
    warehouseSelection:
      warehouseName: '{{task.file_based_knowledge_mart-xvq3.warehouseName}}'
  indexArtifactsLocation:
    databricksVectorSearchEndpoint: '{{task.file_based_knowledge_mart-xvq3.databricksVectorSearchEndpoint}}'
    schema: '{{task.file_based_knowledge_mart-xvq3.indexSchema}}'
    name: '{{task.file_based_knowledge_mart-xvq3.indexName}}'
    database: '{{task.file_based_knowledge_mart-xvq3.indexDatabase}}'
  llmSettings:
    kindId: llm:snowflake
    parameters:
      embedding_model: nv-embed-qa-4
      completion_model: mistral-7b
