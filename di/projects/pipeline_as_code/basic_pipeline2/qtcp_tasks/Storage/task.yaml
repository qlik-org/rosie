properties:
  name: Storage
  id: storage-xvqr
  type: STORAGE
settings:
  artifactsSettings:
    liveViewsEnabled: true
    historyEnabled: true
  artifactsLocation:
    internalSchema: '{{task.storage-xvqr.internalSchema}}'
    taskSchema: '{{task.storage-xvqr.taskSchema}}'
    databaseName: '{{task.storage-xvqr.databaseName}}'
  taskRuntime:
    warehouseSelection:
      warehouseName: '{{task.storage-xvqr.warehouseName}}'
  catalogIntegration:
    publishDatasets: false
  tableTypeSettings:
    tableType: REGULAR
    icebergSettings:
      snowflakeExternalVolume: ''
      folderLocationType: DATA_ASSET_NAME
      specificFolder: ''
      enableOpenCatalogSync: false
      snowflakeOpenCatalog: ''
  viewType: DEFAULT
