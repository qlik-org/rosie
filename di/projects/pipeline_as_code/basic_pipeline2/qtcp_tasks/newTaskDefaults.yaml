landing:
  taskRuntime:
    tableLoadInParallel: 7
  proxySettings:
    proxyOdbc: true
registered:
  incrementalSettings:
    watermarkColumnName:
      expressionStatement: qwert
    useBatchTimeAsFromDate: true
    useSameTableAsCt: true
    softDeleteSupport: true
    softDeleteExpression:
      expressionStatement: poiu
  catalogIntegration:
    publishDatasets: true
  viewType: SECURE_VIEW
storage:
  hasLiveViews: false
  hasHistory: false
  taskRunSchedule:
    runInterval: 120
  catalogIntegration:
    publishDatasets: true
  tableTypeSettings:
    tableType: ICEBERG
    icebergSettings:
      snowflakeExternalVolume: '{{task-type.storage.snowflakeExternalVolume}}'
      folderLocationType: SPECIFIC_FOLDER
      specificFolder: '{{task-type.storage.icebergFolder}}'
      enableOpenCatalogSync: true
      snowflakeOpenCatalog: '{{task-type.storage.snowflakeOpenCatalog}}'
  viewType: SECURE_VIEW
transform:
  materialized: true
  taskRunSchedule:
    runInterval: 30
    schedulingType: TIME_BASED
  catalogIntegration:
    publishDatasets: true
  tableTypeSettings:
    tableType: ICEBERG
    icebergSettings:
      snowflakeExternalVolume: '{{task-type.transform.snowflakeExternalVolume}}'
      folderLocationType: ROOT_FOLDER
      enableOpenCatalogSync: true
      snowflakeOpenCatalog: '{{task-type.transform.snowflakeOpenCatalog}}'
  viewType: SECURE_VIEW
datamart:
  taskRunSchedule:
    runInterval: 5
    schedulingType: TIME_BASED
  catalogIntegration:
    publishDatasets: false
  tableTypeSettings:
    tableType: ICEBERG
    icebergSettings:
      snowflakeExternalVolume: '{{task-type.datamart.snowflakeExternalVolume}}'
      folderLocationType: SPECIFIC_FOLDER
      specificFolder: '{{task-type.datamart.icebergFolder}}'
      enableOpenCatalogSync: true
      snowflakeOpenCatalog: '{{task-type.datamart.snowflakeOpenCatalog}}'
  viewType: SECURE_VIEW
knowledgeMart:
  viewType: SECURE_VIEW
  taskRunSchedule:
    runInterval: 45
    schedulingType: TIME_BASED
  llmSettings:
    kindId: 'llm:Bedrock@1.0.0'
    parameters:
      embedding_model: ''
      completion_model: ''
      completion_model_provider: amazon
fileBasedKnowledgeMart:
  taskRunSchedule:
    schedulingType: NONE
  llmSettings:
    kindId: 'llm:OpenAI@1.0.0'
    parameters:
      embedding_model: text-embedding-ada-002
      completion_model: gpt-4-turbo
