properties:
  name: Knowledge mart
  id: knowledge_mart-exsc
  type: KNOWLEDGE_MART
settings:
  artifactsLocation:
    internalSchema: '{{task.knowledge_mart-exsc.internalSchema}}'
    taskSchema: '{{task.knowledge_mart-exsc.taskSchema}}'
    databaseName: '{{task.knowledge_mart-exsc.databaseName}}'
  taskRuntime:
    maxNumberOfRecords: '{{task.knowledge_mart-exsc.maxNumberOfRecords}}'
    warehouseSelection:
      warehouseName: '{{task.knowledge_mart-exsc.warehouseName}}'
  indexArtifactsLocation:
    databricksVectorSearchEndpoint: '{{task.knowledge_mart-exsc.databricksVectorSearchEndpoint}}'
    schema: '{{task.knowledge_mart-exsc.indexSchema}}'
    name: '{{task.knowledge_mart-exsc.indexName}}'
    database: '{{task.knowledge_mart-exsc.indexDatabase}}'
  llmSettings:
    kindId: llm:snowflake
    parameters:
      embedding_model: nv-embed-qa-4
      completion_model: mistral-7b
