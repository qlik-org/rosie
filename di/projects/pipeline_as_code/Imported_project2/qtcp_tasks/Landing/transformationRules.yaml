rules:
  - ordinal: 0
    actionType: RENAME_COLUMN
    scopeType: COLUMN
    scope:
      whereColumnName: '%Name'
    action:
      renameType: ADD_SUFFIX
      value: _1
    enabled: false
    name: add _1 to Name column
    description: 'will be ...Name_1'
  - ordinal: 1
    actionType: RENAME_TABLE
    scope:
      whereTableName: Order Details
    action:
      renameType: RENAME
      value: Order_Details
    enabled: false
    name: dataset without space
    description: Order_Details
