properties:
  name: Registered_data
  id: registered_data-l5je
  type: REGISTERED_DATA
settings:
  fullLoadOnly: false
  artifactsLocation:
    internalSchema: '{{task.registered_data-l5je.internalSchema}}'
    taskSchema: '{{task.registered_data-l5je.taskSchema}}'
    databaseName: '{{task.registered_data-l5je.databaseName}}'
  incrementalSettings:
    registeredType: REPLICATE
    watermarkColumnName:
      expressionStatement: header__change_seq
    fromDateColumnName:
      expressionStatement: header__timestamp
    ctTableName:
      expressionStatement: ${SOURCE_TABLE_NAME}__ct
    softDeleteSupport: true
    softDeleteExpression:
      expressionStatement: ${header__change_oper} = 'D'
    priorImageSupport: true
    priorImageExpression:
      expressionStatement: ${header__change_oper} = 'B'
