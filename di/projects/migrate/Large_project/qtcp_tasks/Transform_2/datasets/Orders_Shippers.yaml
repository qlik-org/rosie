properties:
  id: orders_shippers--ngv
  name: Orders_Shippers
  inputDatasets:
    - datasetId: orders--nfc
      name: Orders
      taskId: storage--ne8
    - datasetId: shippers--nfe
      name: Shippers
      taskId: storage--ne8
  tableDef:
    name: Orders_Shippers
    columns:
      - name: OrderID
        ordinal: 1
        primaryKeyOrdinal: 1
        datatype:
          type: NUMERIC
          precision: 38
          originalType: NUMBER
          originalTypeFull: NUMBER(38,0)
        id: orderid
      - name: CustomerID
        ordinal: 2
        nullable: true
        datatype:
          type: STRING
          length: 5
          originalType: VARCHAR
          originalTypeFull: VARCHAR(5)
        id: customerid
      - name: EmployeeID
        ordinal: 3
        nullable: true
        datatype:
          type: NUMERIC
          precision: 38
          originalType: NUMBER
          originalTypeFull: NUMBER(38,0)
        id: employeeid
      - name: OrderDate
        ordinal: 4
        nullable: true
        datatype:
          type: DATETIME
          precision: 3
          originalType: TIMESTAMPNTZ
          originalTypeFull: TIMESTAMPNTZ(3)
        id: orderdate
      - name: RequiredDate
        ordinal: 5
        nullable: true
        datatype:
          type: DATETIME
          precision: 3
          originalType: TIMESTAMPNTZ
          originalTypeFull: TIMESTAMPNTZ(3)
        id: requireddate
      - name: ShippedDate
        ordinal: 6
        nullable: true
        datatype:
          type: DATETIME
          precision: 3
          originalType: TIMESTAMPNTZ
          originalTypeFull: TIMESTAMPNTZ(3)
        id: shippeddate
      - name: ShipVia
        ordinal: 7
        nullable: true
        datatype:
          type: NUMERIC
          precision: 38
          originalType: NUMBER
          originalTypeFull: NUMBER(38,0)
        id: shipvia
      - name: Freight
        ordinal: 8
        nullable: true
        datatype:
          type: NUMERIC
          precision: 19
          scale: 4
          originalType: NUMBER
          originalTypeFull: NUMBER(19,4)
        id: freight
      - name: CompanyName
        ordinal: 9
        nullable: true
        datatype:
          type: STRING
          length: 40
          originalType: VARCHAR
          originalTypeFull: VARCHAR(40)
        id: companyname
      - name: Phone
        ordinal: 10
        nullable: true
        datatype:
          type: STRING
          length: 24
          originalType: VARCHAR
          originalTypeFull: VARCHAR(24)
        id: phone
      - name: ShipperID
        ordinal: 11
        nullable: true
        datatype:
          type: NUMERIC
          precision: 38
          originalType: NUMBER
          originalTypeFull: NUMBER(38,0)
        id: shipperid
  customDatasetSettings:
    customSql:
      expressionStatement: "select O.\"OrderID\", O.\"CustomerID\", O.\"EmployeeID\", O.\"OrderDate\",O.\"RequiredDate\", O.\"ShippedDate\", O.\"ShipVia\", O.\"Freight\",\nS.\"CompanyName\",S.\"Phone\", S.\"ShipperID\"\n  from ${Orders} as O\nfull join ${Shippers} as S\non O.\"ShipVia\" = S.\"ShipperID\""
      alias:
        - name: Orders
          value: '{{ref(project.current.projectId)}}$_$storage--ne8$_$orders--nfc'
        - name: Shippers
          value: '{{ref(project.current.projectId)}}$_$storage--ne8$_$shippers--nfe'
    incremental: false
mappingSettings:
  mappings: []
